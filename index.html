<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Shop Đồ Ăn Vặt</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  </head>

  <body>
    <!-- HEADER -->
    <nav class="navbar navbar-dark bg-dark px-3">
      <span class="navbar-brand">🍟 Shop Đồ Ăn Vặt</span>

      <div>
          <button class="btn btn-primary" id="btn-login" >Nhấn vào để đăng nhập</button>
            <div class="d-none" id="profile">
                <img src="https://placehold.co/200" style="width: 50px;height: 50px;border-radius: 50%;" alt="" id="profile-img" />
                <button class="btn btn-danger" id="btn-logout">Logout</button>
            </div>
      </div>
    </nav>

    <!-- BANNER -->
    <div class="banner text-center">
      <h1>Tôi ăn bạn​🥵👍​</h1>
      <p>Bạn đói bạn ăn kệ bạn🤡​</p>
    </div>

    <div class="container mt-4">
      <h3>Thêm sản phẩm</h3>

      <input id="name" class="form-control mb-2" placeholder="Tên sản phẩm" />
      <input id="price" class="form-control mb-2" placeholder="Giá" />
      <input id="image" class="form-control mb-2" placeholder="Hình ảnh" />

      <button onclick="addProduct()" class="btn btn-primary">
        Thêm sản phẩm
      </button>

      <hr />

      <h3>Danh sách sản phẩm</h3>

      <div class="row" id="product-list"></div>
    </div>

    <footer class="text-center mt-5 p-3 bg-light">© 2026 Shop đồ ăn vặt</footer>

    <!-- load file config để xác minh danh tính của người dùng -->
    <script defer src="firebase.config.js"></script>
    <!-- kiểm tra đăng nhập -->
    <script defer src="check-login.js"></script>
    <script defer src="app.js"></script>
  </body>
</html>
