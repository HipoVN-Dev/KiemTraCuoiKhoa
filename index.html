<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Shop Đồ Ăn Vặt</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  </head>

  <body>
    <!-- HEADER -->
    <nav class="navbar navbar-dark bg-dark px-3">
      <span class="navbar-brand">🍟 Shop Đồ Ăn Vặt</span>

      <div>
        <button onclick="login()" class="btn btn-light">Login Google</button>
        <button onclick="logout()" class="btn btn-danger">Logout</button>
      </div>
    </nav>

    <!-- BANNER -->
    <div class="banner text-center">
      <h1>Thiên đường đồ ăn vặt</h1>
      <p>Snack - Trà sữa - Bim bim</p>
    </div>

    <div class="container mt-4">
      <h3>Thêm sản phẩm</h3>

      <input id="name" class="form-control mb-2" placeholder="Tên sản phẩm" />
      <input id="price" class="form-control mb-2" placeholder="Giá" />

      <button onclick="addProduct()" class="btn btn-primary">
        Thêm sản phẩm
      </button>

      <hr />

      <h3>Danh sách sản phẩm</h3>

      <div class="row" id="product-list"></div>
    </div>

    <footer class="text-center mt-5 p-3 bg-light">© 2026 Shop đồ ăn vặt</footer>

    <script src="app.js"></script>
  </body>
</html>
